<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal RPG</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="ambient-bg"></div>
    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Realtime Multiplayer RPG</p>
            <h1>Minimal RPG</h1>
            <p class="hero-subtitle">Explore ember-lit lands, fight monsters, and level up with other players.</p>
        </header>

        <section id="player" class="card stat-card"></section>

        <section id="actions" class="card actions-card"></section>

        <section class="card log-card"> 
            <div class="section-title">Battle Log</div>
            <pre id="log"></pre>
        </section>

        <section id="others" class="card players-card"></section>

    </main>
    
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/game.js"></script>
    
</body>
</html>
